  place_picker:
    git:
      url: https://github.com/lyabs243/locationpicker.git
      ref: 0.10.0

dependency_overrides:
  intl: any
#  new_version_plus: any

dev_dependencies:
  flutter_launcher_icons: ^0.14.1
  change_app_package_name: ^1.5.0
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/appLogo.png"
  min_sdk_android: 24
  remove_alpha_ios: true

flutter:

  uses-material-design: true


  assets:
    - assets/icons/
    - assets/icons/bottom_navigation_icons/
    - assets/images/
    - assets/translation/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Thin.ttf
          weight: 100
        - asset: assets/fonts/Inter-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
