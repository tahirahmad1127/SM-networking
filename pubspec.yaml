          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800

    - family: KronaOne
      fonts:
        - asset: assets/fonts/KronaOne-Regular.ttf
          weight: 400

    - family: Digital
      fonts:
        - asset: assets/fonts/digital.ttf
          weight: 400

    - family: Raleway
      fonts:
